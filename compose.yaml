services:
  db:
    image: postgres:16.1
    container_name: shareit-postgres  # Optional: easier debugging
    ports:
      - "5433:5432"
    volumes:
      - "D:/Normandy/java_projects/shareit-db:/var/lib/postgresql/data"
    environment:
      POSTGRES_DB: shareit
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "12345"  # Quote passwords with special chars
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d shareit"]
      timeout: 5s
      interval: 5s
      retries: 10
    networks:
      - shareit-net

networks:
  shareit-net:
    driver: bridge