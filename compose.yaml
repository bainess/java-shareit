services:

  gateway:
    build: gateway
    image: shareit-gateway
    container_name: shareit-gateway
    ports:
      - "8080:8080"
    depends_on:
      - server
    environment:
      - SHAREIT_SERVER_URL=http://server:9090

  server:
    build: server
    image: shareit-server
    container_name: shareit-server
    ports:
      - "9090:9090"
    depends_on:
      - db
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/shareit
      - SPRING_DATASOURCE_USERNAME=shareit
      - SPRING_DATASOURCE_PASSWORD=shareit

  db:
    image: postgres:16.1
    container_name: shareit-postgres
    ports:
      - "5433:5432"
    volumes:
      - "D:/Normandy/java_projects/shareit-db:/var/lib/postgresql/data"
    environment:
      POSTGRES_DB: shareit
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "12345"  # Quote passwords with special chars
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d shareit"]
      timeout: 5s
      interval: 5s
      retries: 10
    networks:
      - shareit-net

networks:
  shareit-net:
    driver: bridge