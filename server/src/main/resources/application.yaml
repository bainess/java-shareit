server:
  port: 9090

spring:
  application:
    name: shareit-server
  
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/shareit}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:12345}
    driverClassName: org.postgresql.Driver
    
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 5
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  
  sql:
    init:
      mode: never
  
  jackson:
    serialization:
      fail-on-empty-beans: false

logging:
  level:
    ru.practicum.shareit: DEBUG
    org.hibernate.SQL: DEBUG